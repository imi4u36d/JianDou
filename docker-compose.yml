version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: ai-cut-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_cut
    ports:
      - "3306:3306"
    volumes:
      - ./storage/mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7.4
    container_name: ai-cut-redis
    ports:
      - "6379:6379"
    volumes:
      - ./storage/redis:/data


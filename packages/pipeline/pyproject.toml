[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "jiandou-pipeline"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "jiandou-shared==0.1.0",
  "jiandou-db==0.1.0",
  "jiandou-storage==0.1.0",
  "jiandou-media==0.1.0",
  "jiandou-ai==0.1.0",
  "SQLAlchemy>=2.0",
]

[tool.setuptools]
packages = ["jiandou_pipeline"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "jiandou-ai"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "jiandou-shared==0.1.0",
  "jiandou-media==0.1.0",
  "jiandou-storage==0.1.0",
  "pydantic>=2.7",
]

[tool.setuptools]
packages = ["jiandou_ai"]

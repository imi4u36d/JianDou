# 应用基础运行配置。
[app]
# 用于日志和界面展示的应用名称。
name = "JianDou"
# 部署环境标识，通常为 local / dev / prod。
env = "local"
# API 服务在当前运行环境中的监听地址。
api_host = "0.0.0.0"
# Spring Boot API 对外监听端口。
api_port = 8000
# 允许访问 API 的前端来源地址。
web_origin = "http://localhost:5173"
# 任务执行模式，queue 表示由 Spring 内嵌 worker 通过数据库队列执行。
execution_mode = "queue"

# 主数据库连接配置。
[database]
# 应用数据库的 JDBC URL。
url = "jdbc:mysql://127.0.0.1:3306/jiandou?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai"
# 是否输出 SQL 日志，便于调试。
echo = false

# Redis 连接配置，当前仅保留为历史兼容字段。
[redis]
# 若未来重新接入外部缓存/消息队列，可复用该字段。
url = "redis://127.0.0.1:6379/0"

# 本地文件存储结构，用于上传、产物和临时文件。
[storage]
# 所有运行时持久化数据的根目录。
root_dir = "storage"
# 上传源文件的保存目录。
uploads_dir = "storage/uploads"
# 生成媒体产物的输出目录。
outputs_dir = "storage/gen"
# 临时工作文件目录。
temp_dir = "storage/temp"
# 对外可访问的存储根 URL。
public_base_url = "http://127.0.0.1:8000/storage"

# 系统提示词配置文件路径。
[prompt]
# 用于集中管理 system prompt 的 TOML 文件。
file = "config/prompts"

# 模型服务提供方和推理默认配置。
[model]
# 查询阿里云计费用量时使用的 Access Key ID。
aliyun_billing_access_key_id = ""
# 查询阿里云计费用量时使用的 Access Key Secret。
aliyun_billing_access_key_secret = ""
# 查询火山计费用量时使用的 Access Key ID。
volcengine_billing_access_key_id = ""
# 查询火山计费用量时使用的 Access Key Secret。
volcengine_billing_access_key_secret = ""
# 按模型维度的额度映射，JSON 字符串格式，可供前端或计费提示使用。
video_model_usage_quota = "{\"wan2.6-i2v\":300,\"seedance-1.5-pro\":200}"
# 模型请求超时时间，单位秒。
timeout_seconds = 120
# 文本生成采样温度。
temperature = 0.15
# 文本响应最大生成 token 数。
max_tokens = 2000
# 视觉分析时抽取的帧数。
vision_frame_count = 6


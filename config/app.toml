# 请求未显式指定时使用的流程默认值。
[pipeline]
# 前后端共同使用的默认视频比例。
default_aspect_ratio = "9:16"
# 单次请求允许生成的最大结果数。
max_output_count = 10
# 流程允许处理的源视频最大时长，单位分钟。

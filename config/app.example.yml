app:
  name: "JianDou"
  env: "local"
  api_host: "0.0.0.0"
  api_port: 8000
  web_origin: "http://localhost:5173"
  execution_mode: "queue"

database:
  url: "jdbc:mysql://127.0.0.1:3306/jiandou?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai"
  echo: false

redis:
  url: "redis://127.0.0.1:6379/0"

storage:
  root_dir: "storage"
  uploads_dir: "storage/uploads"
  outputs_dir: "storage/gen"
  temp_dir: "storage/temp"
  public_base_url: "http://127.0.0.1:8000/storage"

prompt:
  file: "config/prompts"

model:
  aliyun_billing_access_key_id: ""
  aliyun_billing_access_key_secret: ""
  volcengine_billing_access_key_id: ""
  volcengine_billing_access_key_secret: ""
  video_model_usage_quota: '{"wan2.6-i2v":300,"wan2.6-t2v":300,"qwen-vl":200,"seedance-1.5-pro":200}'
  timeout_seconds: 120
  temperature: 0.15
  max_tokens: 2000
  vision_frame_count: 6
  providers:
    qwen:
      provider: "qwen"
      api_key: "replace-with-your-key"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      extras:
        use_responses_api: true
    openai:
      provider: "openai"
      api_key: "replace-with-openai-key"
      base_url: "https://api.openai.com/v1"
    wan:
      provider: "wan"
      api_key: "replace-with-wan-key"
      base_url: "https://dashscope.aliyuncs.com/api/v1/services/aigc/video-generation/video-synthesis"
      extras:
        task_base_url: "https://dashscope.aliyuncs.com/api/v1/tasks"
        poll_interval_seconds: 8
        poll_timeout_seconds: 600
        prompt_extend: false
    seedream:
      provider: "seedream"
      api_key: "replace-with-seedream-key"
      base_url: "https://ark.cn-beijing.volces.com/api/v3/images/generations"
    seedance:
      provider: "seedance"
      api_key: "replace-with-seedance-key"
      base_url: "https://ark.cn-beijing.volces.com/api/v3/contents/generations/tasks"
      extras:
        task_base_url: "https://ark.cn-beijing.volces.com/api/v3/contents/generations/tasks"
        image_base_url: "https://ark.cn-beijing.volces.com/api/v3/images/generations"
        poll_interval_seconds: 8
        poll_timeout_seconds: 600
  models:
    "gpt-5.4":
      provider: "openai"
      kind: "text"
      label: "GPT-5.4"
      capabilities:
        - "text"
      fallback: "qwen3.6-plus"
    "qwen3.6-plus":
      provider: "qwen"
      kind: "text"
      label: "Qwen 3.6 Plus"
      capabilities:
        - "text"
      fallback: "qwen-plus"
    "qwen-plus":
      provider: "qwen"
      kind: "text"
      label: "Qwen Plus"
      capabilities:
        - "text"
    "qwen-vl-plus-latest":
      provider: "qwen"
      kind: "vision"
      label: "Qwen-VL Plus"
      supports_seed: true
      capabilities:
        - "vision"
        - "text"
      fallback: "qwen3-vl-flash-2026-01-22"
    "qwen3-vl-flash-2026-01-22":
      provider: "qwen"
      kind: "vision"
      label: "Qwen 3 VL Flash 2026-01-22"
      supports_seed: true
      capabilities:
        - "vision"
        - "text"
    "Doubao-Seedream-4.5":
      provider: "seedream"
      kind: "image"
      label: "Doubao Seedream 4.5"
      capabilities:
        - "image"
    "wan2.6-i2v":
      provider: "wan"
      kind: "video"
      label: "Wan 2.6 图生视频"
      supports_seed: true
      capabilities:
        - "video"
    "seedance-1.5-pro":
      provider: "seedance"
      kind: "video"
      label: "Seedance 1.5 Pro"
      supports_seed: false
      capabilities:
        - "video"
  defaults:
    text_analysis: "gpt-5.4"
    planner_fusion: "gpt-5.4"
    creative_prompt: "qwen3.6-plus"
    vision_analysis: "qwen3-vl-flash-2026-01-22"
    prompt_rewrite: "qwen3-vl-flash-2026-01-22"
    image_generation: "Doubao-Seedream-4.5"
    video_generation: "wan2.6-i2v"

catalog:
  defaults:
    style_preset: "cinematic"
    image_size: "1024x1024"
    video_size: "720*1280"
    video_duration_seconds: 8
  aspect_ratios:
    "9:16":
      label: "竖版 9:16"
    "16:9":
      label: "横版 16:9"
  style_presets:
    cinematic:
      label: "电影写实"
      description: "贴近真实影视剧照与镜头语言"
    drama:
      label: "短剧冲突"
      description: "更强调人物冲突和情绪推进"
  image_sizes:
    "1024x1024":
      label: "1:1 · 1024x1024"
      width: 1024
      height: 1024
    "720x1280":
      label: "9:16 · 720x1280"
      width: 720
      height: 1280
  video_sizes:
    "720*1280":
      label: "720 x 1280"
      width: 720
      height: 1280
    "1280*720":
      label: "1280 x 720"
      width: 1280
      height: 720
  video_durations:
    "4":
      label: "4 秒"
    "6":
      label: "6 秒"
    "8":
      label: "8 秒"
    "10":
      label: "10 秒"
    "12":
      label: "12 秒"

platform:
  defaults:
    default_platform: "douyin"
    default_aspect_ratio: "9:16"
    default_editing_mode: "drama"
    default_style_preset: "cinematic"
  platforms:
    douyin:
      label: "抖音"
      default_aspect_ratio: "9:16"
      default_video_size: "720*1280"
      default_video_duration_seconds: 8

pipeline:
  default_aspect_ratio: "9:16"
  max_output_count: 10
  max_source_minutes: 120
  default_intro_template: "hook"
  default_outro_template: "brand"
